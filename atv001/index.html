<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prontuário Eletrônico - Estrutura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1">Prontuário Eletrônico</span>
        </div>
    </nav>
    <div class="container mt-4">
        <form>
            <div class="card mb-4">
                <div class="card-header bg-info text-white text-center">
                    Dados do Paciente
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <p>Nome</p>
                            <input type="text" class="form-control" placeholder="Digite seu Nome">
                        </div>
                        <div class="col-md-3 mb-3">
                            <p>Idade</p>
                            <input type="number" class="form-control" placeholder="Digite sua Idade">
                        </div> 
                        <div class="col-md-3 mb-3">
                            <p>Sexo</p>
                            <input type="text" class="form-control" placeholder="Digite seu Sexo">
                        </div>
                    </div>
                </div>
            </div>
            <div class="card mb-4">
                <div class="card-header bg-info text-white text-center">
                    Sinais Vitais
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <p>Pressão</p>
                            <input type="text" class="form-control" placeholder="Ex: 12.8">
                        </div>
                        <div class="col-md-3 mb-3">
                            <p>Temperatura</p>
                            <input type="text" class="form-control" placeholder="Ex: 36.5">
                        </div>
                        <div class="col-md-3 mb-3">
                            <p>Frequência Cardíaca</p>
                            <input type="text" class="form-control" placeholder="Ex: 80bpm">
                        </div>
                        <div class="col-md-3 mb-3">
                            <p>Saturação</p>
                            <input type="text" class="form-control" placeholder="EX: 98">
                        </div>
                    </div>
                </div>
            </div>
            <div class="card mb-4">
                <div class="card-header bg-info text-white text-center">
                    Evolução do Paciente
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <textarea class="form-control" rows="4" placeholder="Descreva a evolução"></textarea>
                    </div>
                </div>
            </div>
            <div class="card mb-4">
                <div class="card-header bg-info text-white text-center">
                    Medicação
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <p>Medicamento</p>
                            <input type="text" class="form-control" placeholder="Digite o medicamento">
                        </div>
                        <div class="col-md-3 mb-3">
                            <p>Dose</p>
                            <input type="text" class="form-control" placeholder="Digite a dose">
                        </div>
                        <div class="col-md-3 mb-3">
                            <p>Horário</p>
                            <input type="text" class="form-control" placeholder="Digite o horário">
                        </div>
                    </div>
                </div>
            </div>
         <div class="text-end mb-5">
    <button class="btn btn-primary" type="submit">
         Salvar Prontuário
     </button>
    </div>
    </form>
</div>
</body>
</html>
